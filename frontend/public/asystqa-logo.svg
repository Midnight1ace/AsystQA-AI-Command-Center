<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title>AsystQA logo</title>
  <desc>Hexagon AI command center mark with stylized A, Q, shield check, analytics, and circuit details.</desc>
  <defs>
    <linearGradient id="hexGradient" x1="96" x2="416" y1="116" y2="398" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1df9ff" />
      <stop offset="0.44" stop-color="#0ea5ff" />
      <stop offset="1" stop-color="#12f3d1" />
    </linearGradient>
    <linearGradient id="whiteGradient" x1="174" x2="329" y1="143" y2="357" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="0.58" stop-color="#f3f7fb" />
      <stop offset="1" stop-color="#b8cbd7" />
    </linearGradient>
    <linearGradient id="qGradient" x1="219" x2="314" y1="239" y2="344" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#19f8ff" />
      <stop offset="1" stop-color="#147cff" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.04 0 0 0 0 0.78 0 0 0 0 1 0 0 0 0.7 0" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="#040711" />
  <path d="M256 68 399 158v176L256 444 113 334V158Z" fill="none" stroke="url(#hexGradient)" stroke-width="26" stroke-linejoin="round" filter="url(#softGlow)" />
  <path d="M183 307 242 170c5-12 23-12 28 0l59 137" fill="none" stroke="url(#whiteGradient)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="256" cy="284" r="47" fill="none" stroke="url(#qGradient)" stroke-width="30" />
  <path d="M288 316 326 354" fill="none" stroke="url(#qGradient)" stroke-width="30" stroke-linecap="square" />

  <path d="M348 218 403 197l55 21v48c0 48-32 78-55 87-23-9-55-39-55-87Z" fill="#061526" fill-opacity="0.82" stroke="url(#hexGradient)" stroke-width="11" />
  <path d="m382 267 19 19 39-45" fill="none" stroke="#1df9ff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />

  <path d="M82 207h34l26 26h46" fill="none" stroke="#0e7cff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
