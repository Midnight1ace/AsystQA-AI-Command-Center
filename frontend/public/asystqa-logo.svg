  <path d="M88 318h30l49-45h41" fill="none" stroke="#0e7cff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="78" cy="207" r="10" fill="#040711" stroke="#0e7cff" stroke-width="8" />
  <circle cx="78" cy="260" r="10" fill="#040711" stroke="#0e7cff" stroke-width="8" />
  <circle cx="88" cy="318" r="10" fill="#040711" stroke="#0e7cff" stroke-width="8" />
  <circle cx="167" cy="189" r="10" fill="#040711" stroke="#12cffe" stroke-width="8" />

  <path d="M204 363v38M235 341v60M266 368v33M297 356v45" stroke="url(#hexGradient)" stroke-width="14" stroke-linecap="square" />
